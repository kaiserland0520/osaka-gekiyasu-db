<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大阪激安居酒屋データベース</title>

    <!-- OGP（SNSシェア・SEO用） -->
    <meta name="description" content="大阪を中心に激安居酒屋・コストパフォーマンスに優れた居酒屋をまとめているデータベースサイトです。">
    <meta property="og:title" content="大阪激安居酒屋データベース">
    <meta property="og:description" content="大阪を中心に激安居酒屋・コストパフォーマンスに優れた居酒屋をまとめているデータベースサイトです。">
    <meta property="og:image" content="https://osaka-gekiyasu-db.com/images/ogp.jpg">
    <meta property="og:url" content="https://osaka-gekiyasu-db.com/">
    <meta property="og:type" content="website">
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>
                <a href="index.html">
                    <img src="header-logo.png" alt="大阪激安居酒屋データベース" class="header-logo">
                </a>
            </h1>
            <p>大阪を中心に激安居酒屋やコストパフォーマンスに優れた居酒屋をまとめています</p>
        </div>
    </header>

    <main class="container">
        <div class="layout-wrapper">
            <!-- メインコンテンツ -->
            <section class="main-content">
                <h2>居酒屋一覧(新着順)</h2>
                <p class="howto-link"><a href="guide/howto.html"><i class="mdi mdi-help-circle-outline"></i> 各項目の見方・選定基準</a></p>
                <div class="search-box">
                    <i class="mdi mdi-magnify search-icon"></i>
                    <input type="text" id="search-input" placeholder="店名・エリア・特徴で検索..." oninput="filterBySearch(this.value)">
                </div>
                <div id="shop-list" class="shop-list">
                    <!-- JavaScriptにより店舗カードがここに生成されます -->
                    <p class="loading">読み込み中...</p>
                </div>
                
                <!-- ページ送りボタン -->
                <div id="pagination" class="pagination"></div>

                <!-- 共有ボタン -->
                <div class="share-buttons-area">
                    <p class="share-label"><i class="mdi mdi-share-variant"></i> このページを共有</p>
                    <div class="share-buttons">
                        <a class="share-btn share-x" href="#" onclick="shareX(event)" title="X(Twitter)でシェア"><i class="mdi mdi-twitter"></i><span>X</span></a>
                        <a class="share-btn share-facebook" href="#" onclick="shareFacebook(event)" title="Facebookでシェア"><i class="mdi mdi-facebook"></i><span>Facebook</span></a>
                        <a class="share-btn share-line" href="#" onclick="shareLine(event)" title="LINEでシェア"><i class="mdi mdi-chat"></i><span>LINE</span></a>
                        <a class="share-btn share-instagram" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer" title="Instagramを開く"><i class="mdi mdi-instagram"></i><span>Instagram</span></a>
                        <a class="share-btn share-bluesky" href="#" onclick="shareBluesky(event)" title="Blueskyでシェア"><i class="mdi mdi-butterfly"></i><span>Bluesky</span></a>
                        <a class="share-btn share-threads" href="#" onclick="shareThreads(event)" title="Threadsでシェア"><i class="mdi mdi-at"></i><span>Threads</span></a>
                        <a class="share-btn share-copy" href="#" onclick="copyUrl(event)" title="URLをコピー"><i class="mdi mdi-link-variant"></i><span>URLをコピー</span></a>
                    </div>
                </div>
            </section>

            <!-- サイドバー（sidebar.jsにより自動生成） -->
            <aside class="sidebar" id="common-sidebar"></aside>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 大阪激安居酒屋データベース</p>
    </footer>

    <script src="app.js"></script>
    <script src="sidebar.js"></script>
</body>
</html>
